image:
  name: redis-monitoring-service
  tag: 1.1.1
network:
  port: 80
  ingress:
    activeHost: "vd-devops-tests.com"
    previewHost: "preview.vd-devops-tests.com"
rollout:
  autoPromotionEnabled: false
  scaleDownDelaySeconds: 30
resources:
  requests:
    cpu: "10m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpu:
    averageUtilization: 60
